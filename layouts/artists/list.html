{{ define "main" }}
<h1 class="text-3xl font-bold mb-8">{{ .Title }}</h1>
<ul class="not-prose space-y-3">
  {{ range .Pages }}
  <li>
    <a href="{{ .Permalink }}" class="text-lg font-semibold hover:underline">{{ .Title }}</a>
    {{- with .Params.releases }}
    <span class="text-sm opacity-50 ml-2">&mdash; {{ len . }} release{{ if gt (len .) 1 }}s{{ end }}</span>
    {{- end }}
  </li>
  {{ end }}
</ul>
{{ end }}
