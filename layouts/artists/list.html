{{ define "main" }}

<p class="sp-eyebrow">The roster</p>
<h1 class="sp-page-title">Artists<em>.</em></h1>
<div class="sp-divider"></div>

<div class="sp-artists-grid">
  {{- range .Pages }}
  <a class="sp-artist-card" href="{{ .Permalink }}">
    <span class="sp-artist-name">{{ .Title }}</span>
    {{- with .Params.releases }}
    <span class="sp-artist-count">{{ len . }} release{{ if gt (len .) 1 }}s{{ end }}</span>
    {{- end }}
  </a>
  {{- end }}
</div>

{{ end }}
