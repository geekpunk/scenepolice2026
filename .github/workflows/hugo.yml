# Build and deploy Scene Police site to Google Cloud Storage
name: Deploy Hugo site

on:
  push:
    branches: ["master"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  Deploy:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v5
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          HUGO_VERSION=0.147.0
          wget -q https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          rm hugo_extended_${HUGO_VERSION}_linux-amd64.deb

      - name: Build site
        run: hugo --minify

      - name: Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: gsutil -m rsync -d -c -r public gs://scenepolice

      - name: Set cache headers
        run: gsutil -m setmeta -h "Cache-Control:public, max-age=3600" "gs://scenepolice/**"
